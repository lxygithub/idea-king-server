<!-- Edit Modal -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-edit mr-1"></i> 编辑文件</h5>
                <button type="button" class="close" data-bs-dismiss="modal"><span>&times;</span></button>
            </div>
            <form method="post" action="/admin/files/ID/update" id="editForm">
                <div class="modal-body">
                    <input type="hidden" name="file_id" id="editFileId">
                    <input type="hidden" name="tags" id="editTagsHidden" value="">
                    <div class="form-group">
                        <label>文件名</label>
                        <input type="text" class="form-control" name="name" id="editName">
                    </div>
                    <div class="form-group">
                        <label>标签</label>
                        <div id="editTagsContainer" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;min-height:32px"></div>
                        <div style="display:flex;gap:8px">
                            <input type="text" class="form-control" id="editTagInput" placeholder="输入标签后回车" style="flex:1">
                            <button type="button" class="btn btn-sm btn-outline-primary" onclick="addEditTag()"><i class="fas fa-plus"></i></button>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save mr-1"></i> 保存</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Preview Modal -->
<div class="modal fade" id="previewModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="previewTitle">预览</h5>
                <button type="button" class="close" data-bs-dismiss="modal"><span>&times;</span></button>
            </div>
            <div class="modal-body text-center p-0" id="previewBody">
            </div>
        </div>
    </div>
</div>

<script>
function openPreview(id, type, name) {
    document.getElementById("previewTitle").textContent = name;
    var body = document.getElementById("previewBody");
    var url = "/api/files/" + id + "/download?token=admin";
    if (type === "image") {
        body.innerHTML = "<img src=\"" + url + "\" style=\"max-width:100%;max-height:70vh\">";
    } else if (type === "video") {
        body.innerHTML = "<video controls style=\"max-width:100%;max-height:70vh\"><source src=\"" + url + "\"></video>";
    } else if (type === "audio") {
        body.innerHTML = "<audio controls style=\"width:80%;margin:40px auto\"><source src=\"" + url + "\"></audio>";
    } else {
        body.innerHTML = "<iframe src=\"" + url + "\" style=\"width:100%;height:70vh;border:none\"></iframe>";
    }
    new bootstrap.Modal(document.getElementById("previewModal")).show();
}

var editTags = [];

function renderEditTags() {
    var container = document.getElementById("editTagsContainer");
    container.innerHTML = "";
    editTags.forEach(function(tag, i) {
        var span = document.createElement("span");
        span.style.cssText = "display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:#e0e7ff;color:#4f46e5;border-radius:6px;font-size:13px";
        span.innerHTML = tag + " <i class=\"fas fa-times\" style=\"cursor:pointer;font-size:10px\"></i>";
        span.querySelector("i").onclick = function() { editTags.splice(i, 1); renderEditTags(); };
        container.appendChild(span);
    });
    document.getElementById("editTagsHidden").value = editTags.join(", ");
}

function addEditTag() {
    var input = document.getElementById("editTagInput");
    var tag = input.value.trim();
    if (tag && editTags.indexOf(tag) === -1) {
        editTags.push(tag);
        renderEditTags();
    }
    input.value = "";
    input.focus();
}

document.getElementById("editTagInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter") { e.preventDefault(); addEditTag(); }
});

document.getElementById("editForm").addEventListener("submit", function() {
    var fileId = document.getElementById("editFileId").value;
    this.action = "/admin/files/" + fileId + "/update";
});
</script>
