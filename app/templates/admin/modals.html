<!-- Preview Modal -->
<div id="previewModal" class="modal-overlay" onclick="closePreview()">
    <div class="modal-content modal-preview" onclick="event.stopPropagation()">
        <div class="modal-header">
            <span id="previewTitle">预览</span>
            <button class="modal-close" onclick="closePreview()">✕</button>
        </div>
        <div class="modal-body" id="previewBody"></div>
        <div class="modal-footer">
            <a id="downloadBtn" class="btn btn-primary btn-sm" target="_blank">⬇ 下载原文件</a>
            <button class="btn btn-sm" onclick="closePreview()">关闭</button>
        </div>
    </div>
</div>

<!-- Edit Modal -->
<div id="editModal" class="modal-overlay" onclick="closeEdit()">
    <div class="modal-content" style="max-width:450px" onclick="event.stopPropagation()">
        <div class="modal-header">
            <span>编辑文件</span>
            <button class="modal-close" onclick="closeEdit()">✕</button>
        </div>
        <form id="editForm" method="post" onsubmit="return submitEdit()">
            <div class="modal-body">
                <input type="hidden" name="file_id" id="editFileId">
                <div class="form-group">
                    <label>文件名</label>
                    <input type="text" name="name" id="editName" class="form-input" required>
                </div>
                <div class="form-group">
                    <label>标签（逗号分隔）</label>
                    <input type="text" name="tags" id="editTags" class="form-input" placeholder="标签1, 标签2, 标签3">
                </div>
            </div>
            <div class="modal-footer">
                <button type="submit" class="btn btn-primary">保存</button>
                <button type="button" class="btn" onclick="closeEdit()">取消</button>
            </div>
        </form>
    </div>
</div>

<script>
function openPreview(id, type, name) {
    var modal = document.getElementById('previewModal');
    document.getElementById('previewTitle').textContent = name || '预览';
    var body = document.getElementById('previewBody');
    var dl = document.getElementById('downloadBtn');
    var url = '/api/files/' + id + '/download?token=admin';
    dl.href = url;
    if (type === 'image') {
        body.innerHTML = '<img src="' + url + '" style="max-width:100%;max-height:70vh;border-radius:8px;display:block;margin:0 auto">';
    } else if (type === 'video') {
        body.innerHTML = '<video controls style="max-width:100%;max-height:70vh;border-radius:8px" autoplay><source src="' + url + '"></video>';
    } else if (type === 'audio') {
        body.innerHTML = '<div style="padding:40px;text-align:center"><div style="font-size:64px;margin-bottom:20px">♪</div><audio controls style="width:100%" autoplay><source src="' + url + '"></audio></div>';
    } else if (type === 'text') {
        body.innerHTML = '<div style="text-align:center;padding:20px;color:var(--gray-400)">加载中...</div>';
        var xhr = new XMLHttpRequest();
        xhr.open('GET', url, true);
        xhr.onload = function() {
            if (xhr.status === 200) {
                body.innerHTML = '<pre style="max-height:60vh;overflow:auto;background:var(--gray-50);padding:16px;border-radius:8px;font-size:13px;line-height:1.5;white-space:pre-wrap">' + escapeHtml(xhr.responseText) + '</pre>';
            } else { body.innerHTML = '<p style="color:var(--danger);text-align:center">加载失败</p>'; }
        };
        xhr.onerror = function() { body.innerHTML = '<p style="color:var(--danger);text-align:center">加载失败</p>'; };
        xhr.send();
    } else {
        body.innerHTML = '<p style="text-align:center;padding:40px;color:var(--gray-500)">该类型不支持在线预览</p>';
    }
    modal.style.display = 'flex';
    document.body.style.overflow = 'hidden';
}
function closePreview() {
    document.getElementById('previewModal').style.display = 'none';
    document.getElementById('previewBody').innerHTML = '';
    document.body.style.overflow = '';
}
function closeEdit() {
    document.getElementById('editModal').style.display = 'none';
    document.body.style.overflow = '';
}
function submitEdit() {
    var id = document.getElementById('editFileId').value;
    var name = document.getElementById('editName').value.trim();
    var tags = document.getElementById('editTags').value.trim();
    if (!name) { alert('文件名不能为空'); return false; }
    var form = document.createElement('form');
    form.method = 'post';
    form.action = '/admin/files/' + id + '/update';
    form.style.display = 'none';
    var i1 = document.createElement('input'); i1.name = 'name'; i1.value = name; form.appendChild(i1);
    var i2 = document.createElement('input'); i2.name = 'tags'; i2.value = tags; form.appendChild(i2);
    document.body.appendChild(form);
    form.submit();
    return false;
}
function escapeHtml(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') { closePreview(); closeEdit(); }
});
</script>
