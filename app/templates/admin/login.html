<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - 点子王</title>
    <link rel="stylesheet" href="/static/admin/style.css">
</head>
<body class="login-page">
    <div class="login-box">
        <div class="login-logo">
            <svg viewBox="0 0 24 24"><path d="M12 2a3 3 0 0 0-3 3v2H7a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-2V5a3 3 0 0 0-3-3zm-1 3a1 1 0 0 1 2 0v2h-2V5zm-4 4h10v10H7V9zm3 2v4h2v-4h-2z"/></svg>
        </div>
        <h1>点子王</h1>
        <p class="login-subtitle">管理后台</p>
        {% if request.query_params.get('error') %}
        <div class="alert alert-error">用户名或密码错误，或无管理员权限</div>
        {% endif %}
        <form method="post">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="请输入管理员用户名" required>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block" style="padding:12px">登录</button>
        </form>
    </div>
</body>
</html>
