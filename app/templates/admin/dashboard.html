{% extends "base.html" %}
{% block title %}概览{% endblock %}
{% block content %}
<div class="page-header">
    <h1>{% if is_admin %}系统概览{% else %}我的概览{% endif %}</h1>
</div>

{% if is_admin %}
<div class="stats-row">
    <div class="stat-card">
        <div class="stat-number">{{ user_count }}</div>
        <div class="stat-label">用户总数</div>
    </div>
    <div class="stat-card">
        <div class="stat-number">{{ file_count }}</div>
        <div class="stat-label">文件总数</div>
    </div>
</div>
{% else %}
<div class="stats-row">
    <div class="stat-card">
        <div class="stat-number">{{ file_count }}</div>
        <div class="stat-label">我的文件</div>
    </div>
</div>
<div style="margin-top:20px">
    <a href="/admin/users/{{ user_id }}" class="btn btn-primary">查看我的文件</a>
</div>
{% endif %}
{% endblock %}
