<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}管理后台{% endblock %} - 点子王</title>
    <link rel="stylesheet" href="/static/admin/adminlte/bootstrap.min.css">
    <link rel="stylesheet" href="/static/admin/adminlte/all.min.css">
    <link rel="stylesheet" href="/static/admin/adminlte/adminlte.min.css">
    <link rel="stylesheet" href="/static/admin/style.css">
    <style>
        {% block extra_css %}{% endblock %}
        /* Light mode (default) */
        body { background: #f4f6f9; color: #212529; }
        .content-wrapper { background: #f4f6f9; }
        .card { background: #fff; border: 1px solid #dee2e6; }
        .card-header { background: #fff; border-bottom: 1px solid #dee2e6; color: #212529; }
        .table th { background: #f8f9fa; }
        .main-header.navbar { background: #fff; border-bottom: 1px solid #dee2e6; }
        
        /* Dark mode */
        body.dark-mode { background: #1a1a2e; color: #eaeaea; }
        .dark-mode .content-wrapper { background: #1a1a2e; }
        .dark-mode .main-sidebar { background: #16213e; }
        .dark-mode .sidebar-dark-primary .nav-sidebar > .nav-item > .nav-link.active { background: #4f46e5 !important; }
        .dark-mode .card { background: #0f3460; border-color: #2a2a4a; }
        .dark-mode .card-header { background: rgba(255,255,255,0.05); border-color: #2a2a4a; color: #eaeaea; }
        .dark-mode .table { color: #eaeaea; }
        .dark-mode .table th { background: rgba(255,255,255,0.05); color: #a0a0a0; }
        .dark-mode .table td { border-color: #2a2a4a; }
        .dark-mode .table-hover tbody tr:hover { background: rgba(255,255,255,0.05); }
        .dark-mode .main-header.navbar { background: #16213e; border-color: #2a2a4a; }
        .dark-mode .nav-link { color: #a0a0a0; }
        .dark-mode .nav-link:hover { color: #eaeaea; background: rgba(255,255,255,0.1); }
        .dark-mode .small-box { background: #0f3460; }
        .dark-mode .small-box .inner h3 { color: #eaeaea; }
        .dark-mode .small-box .inner p { color: #a0a0a0; }
        .dark-mode .form-control { background: rgba(255,255,255,0.1); border-color: #2a2a4a; color: #eaeaea; }
        .dark-mode .form-control:focus { background: rgba(255,255,255,0.15); }
        .dark-mode .modal-content { background: #0f3460; }
        .dark-mode .modal-header { border-color: #2a2a4a; color: #eaeaea; }
        .dark-mode .modal-footer { border-color: #2a2a4a; }
        .dark-mode .badge.bg-light { background: rgba(255,255,255,0.1) !important; color: #eaeaea; }
        .dark-mode .text-muted { color: #a0a0a0 !important; }
        .dark-mode .brand-link { background: #16213e; }
        .dark-mode .info-card { background: #0f3460; border-color: #2a2a4a; }
        .dark-mode .alert-success { background: rgba(16,185,129,0.2); color: #10b981; border-color: rgba(16,185,129,0.3); }
        .dark-mode .btn-outline-primary { color: #818cf8; border-color: #818cf8; }
        .dark-mode .btn-outline-secondary { color: #a0a0a0; border-color: #a0a0a0; }
        .dark-mode .btn-outline-danger { color: #ef4444; border-color: #ef4444; }
        .theme-toggle { cursor: pointer; }
        .theme-toggle:hover { background: rgba(0,0,0,0.05); border-radius: 4px; }
        .dark-mode .theme-toggle:hover { background: rgba(255,255,255,0.1); }
        /* === Dark mode fixes (high priority) === */
        body.dark-mode { background: #111827 !important; color: #e5e7eb !important; }
        body.dark-mode .content-wrapper { background: #111827 !important; }
        body.dark-mode .main-header.navbar { background: #1f2937 !important; border-color: #374151 !important; }
        body.dark-mode .theme-toggle { color: #fbbf24 !important; }
        
        /* Table dark mode */
        body.dark-mode .table-wrap { background: #1f2937 !important; border-color: #374151 !important; }
        body.dark-mode .table { color: #e5e7eb !important; }
        body.dark-mode .table th { background: #111827 !important; color: #9ca3af !important; border-color: #374151 !important; }
        body.dark-mode .table td { background: #1f2937 !important; color: #d1d5db !important; border-color: #374151 !important; }
        body.dark-mode .table tbody tr:nth-child(even) td { background: #1a2332 !important; }
        body.dark-mode .table tbody tr:hover td { background: #283548 !important; }
        
        /* Badges & Tags dark mode */
        body.dark-mode .badge-user { background: rgba(255,255,255,0.1) !important; color: #d1d5db !important; }
        body.dark-mode .tag { background: rgba(99,102,241,0.25) !important; color: #a5b4fc !important; }
        body.dark-mode .tag-more { background: rgba(255,255,255,0.1) !important; color: #9ca3af !important; }
        
        /* Type badges dark mode */
        body.dark-mode .type-image { background: rgba(16,185,129,0.2) !important; color: #34d399 !important; }
        body.dark-mode .type-video { background: rgba(245,158,11,0.2) !important; color: #fbbf24 !important; }
        body.dark-mode .type-audio { background: rgba(99,102,241,0.2) !important; color: #a5b4fc !important; }
        body.dark-mode .type-text { background: rgba(14,165,233,0.2) !important; color: #38bdf8 !important; }
        body.dark-mode .type-other { background: rgba(255,255,255,0.1) !important; color: #9ca3af !important; }
        
        /* File elements dark mode */
        body.dark-mode .row-num { background: rgba(255,255,255,0.1) !important; color: #9ca3af !important; }
        body.dark-mode .file-name { color: #e5e7eb !important; }
        body.dark-mode .cell-muted { color: #9ca3af !important; }
        body.dark-mode .file-thumb { border-color: #374151 !important; }
        body.dark-mode .file-icon-video { background: rgba(245,158,11,0.2) !important; }
        body.dark-mode .file-icon-audio { background: rgba(99,102,241,0.2) !important; }
        body.dark-mode .file-icon-text { background: rgba(14,165,233,0.2) !important; }
        body.dark-mode .file-icon-pdf { background: rgba(239,68,68,0.2) !important; }
        body.dark-mode .file-icon-default { background: rgba(255,255,255,0.1) !important; }
        
        /* Batch bar & alerts dark mode */
        body.dark-mode .batch-bar { background: #1f2937 !important; border-color: #374151 !important; }
        body.dark-mode .batch-bar .count { color: #d1d5db !important; }
        body.dark-mode .alert-success { background: rgba(16,185,129,0.15) !important; color: #34d399 !important; border-color: rgba(16,185,129,0.3) !important; }
        
        /* Checkbox - inline styles handle centering */

        /* Button dark mode */
        body.dark-mode .btn { background: #374151 !important; color: #e5e7eb !important; border-color: #4b5563 !important; }
        body.dark-mode .btn:hover { background: #4b5563 !important; }
        body.dark-mode .btn-xs { background: #374151 !important; color: #e5e7eb !important; }
        body.dark-mode .btn-xs:hover { background: #4b5563 !important; }
        body.dark-mode .btn-danger { background: #dc2626 !important; color: #fff !important; }
        body.dark-mode .btn-danger:hover { background: #b91c1c !important; }
        body.dark-mode .btn-edit { background: #374151 !important; color: #e5e7eb !important; }
        /* Light mode navbar buttons - explicit colors */
        body:not(.dark-mode) .navbar-nav .nav-link { color: #374151 !important; }
        body:not(.dark-mode) .navbar-nav .nav-link:hover { background: rgba(0,0,0,0.05) !important; }
        body:not(.dark-mode) .theme-toggle { color: #6b7280 !important; }
        body:not(.dark-mode) .theme-toggle:hover { color: #4f46e5 !important; }
        body:not(.dark-mode) .text-danger { color: #dc2626 !important; }
        body:not(.dark-mode) .nav-link.text-danger { color: #dc2626 !important; }
        body:not(.dark-mode) .nav-link.text-danger:hover { background: rgba(220,38,38,0.1) !important; }

        
        /* Actions column right align */
        .table td:last-child .actions { justify-content: flex-end; }
        
        /* Sidebar fix - ensure AdminLTE sidebar works */
        body.dark-mode .main-sidebar { background: #1f2337 !important; }
        body.dark-mode .sidebar { background: #1f2337 !important; }
        body.dark-mode .nav-sidebar > .nav-item > .nav-link { color: #9ca3af !important; }
        body.dark-mode .nav-sidebar > .nav-item > .nav-link:hover { color: #e5e7eb !important; background: rgba(255,255,255,0.1) !important; }
        body.dark-mode .nav-sidebar > .nav-item > .nav-link.active { background: #4f46e5 !important; color: #fff !important; }
        body.dark-mode .brand-link { background: #161b2e !important; border-bottom: 1px solid #374151 !important; }
        body.dark-mode .brand-text { color: #e5e7eb !important; }
        
        /* Fix navbar pushmenu button */
        body.dark-mode .navbar-nav .nav-link { color: #e5e7eb !important; }
        body.dark-mode .navbar-nav .nav-link:hover { background: rgba(255,255,255,0.1) !important; }
        
        /* Page header */
        body.dark-mode .page-header h1 { color: #e5e7eb !important; }
        body.dark-mode .page-header span { color: #9ca3af !important; }

    </style>
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">
    <nav class="main-header navbar navbar-expand navbar-dark">
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="nav-link" data-widget="pushmenu" href="#" role="button">
                    <i class="fas fa-bars"></i>
                </a>
            </li>
        </ul>
        <ul class="navbar-nav ml-auto">
            <li class="nav-item">
                <a class="nav-link theme-toggle" onclick="toggleTheme()" title="切换主题">
                    <i class="fas fa-moon" id="themeIcon"></i>
                </a>
            </li>
            <li class="nav-item">
                <span class="nav-link">
                    <i class="fas fa-user-circle mr-1"></i>{{ admin_username }}
                </span>
            </li>
            <li class="nav-item">
                <a href="/admin/logout" class="nav-link text-danger">
                    <i class="fas fa-sign-out-alt"></i>
                </a>
            </li>
        </ul>
    </nav>

    <aside class="main-sidebar sidebar-dark-primary elevation-4">
        <a href="/admin/dashboard" class="brand-link text-center">
            <span class="brand-text"><b class="text-warning">💡</b> <b>点子王</b></span>
        </a>
        <div class="sidebar">
            <nav class="mt-2">
                <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu">
                    <li class="nav-item">
                        <a href="/admin/dashboard" class="nav-link {% if request.url.path == '/admin/dashboard' %}active{% endif %}">
                            <i class="nav-icon fas fa-tachometer-alt"></i>
                            <p>概览</p>
                        </a>
                    </li>
                    {% if request.session.get(admin_is_admin) %}
                    <li class="nav-item">
                        <a href="/admin/users" class="nav-link {% if "/admin/users" in request.url.path %}active{% endif %}">
                            <i class="nav-icon fas fa-users"></i>
                            <p>用户管理</p>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/admin/files" class="nav-link {% if "/admin/files" in request.url.path %}active{% endif %}">
                            <i class="nav-icon fas fa-folder-open"></i>
                            <p>文件管理</p>
                        </a>
                    </li>
                    {% endif %}
                </ul>
            </nav>
        </div>
    </aside>

    <div class="content-wrapper">
        <div class="content-header">
            <div class="container-fluid">
                <div class="row mb-2">
                    <div class="col-sm-6">
                        <h1 class="m-0" style="color:var(--text-primary)">{% block page_title %}{% endblock %}</h1>
                    </div>
                </div>
            </div>
        </div>
        <section class="content">
            <div class="container-fluid">
                {% block content %}{% endblock %}
            </div>
        </section>
    </div>

    <footer class="main-footer text-center" style="color:var(--text-secondary);font-size:12px">
        点子王管理后台 &copy; 2026
    </footer>
</div>

<script src="/static/admin/adminlte/jquery.min.js"></script>
<script src="/static/admin/adminlte/bootstrap.bundle.min.js"></script>
<script src="/static/admin/adminlte/adminlte.min.js"></script>
<script>
function toggleTheme() {
    var body = document.body;
    var icon = document.getElementById("themeIcon");
    body.classList.toggle("dark-mode");
    if (body.classList.contains("dark-mode")) {
        icon.className = "fas fa-sun";
        localStorage.setItem("theme", "dark");
    } else {
        icon.className = "fas fa-moon";
        localStorage.setItem("theme", "light");
    }
}
// Load saved theme - default to dark
(function() {
    var saved = localStorage.getItem("theme");
    if (saved === "light") {
        document.body.classList.remove("dark-mode");
        document.getElementById("themeIcon").className = "fas fa-moon";
    } else {
        document.body.classList.add("dark-mode");
        document.getElementById("themeIcon").className = "fas fa-sun";
    }
})();
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
